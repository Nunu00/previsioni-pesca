name: Build Unsigned IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS Application
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies -project MeteoPesca.xcodeproj -scheme MeteoPesca

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project MeteoPesca.xcodeproj \
            -scheme MeteoPesca \
            -configuration Release \
            -archivePath build/MeteoPesca.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/MeteoPesca.xcarchive/Products/Applications/MeteoPesca.app build/Payload/
          cd build
          zip -r PescAttiva.ipa Payload
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PescAttiva-Unsigned-IPA
          path: build/PescAttiva.ipa
